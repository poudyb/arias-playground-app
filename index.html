<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Aria's Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #fff;
    width: 100vw;
    height: 100vh; /* fallback for older browsers */
    height: 100dvh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: system-ui, -apple-system, sans-serif;
    user-select: none;
    -webkit-user-select: none;
  }

  body.portal-open {
    overflow: auto;
    align-items: flex-start;
    justify-content: center;
    min-height: 100dvh;
    background: linear-gradient(165deg, #7c4dff 0%, #ff6ec7 45%, #ffd54f 100%);
  }

  /* --- Landing (Aria's Portal) --- */
  #screen-home {
    display: none;
    width: 100%;
    min-height: 100dvh;
    padding: clamp(1rem, 4vw, 2rem);
    flex-direction: column;
    align-items: center;
    font-family: "Fredoka", system-ui, sans-serif;
  }

  body.portal-open #screen-home {
    display: flex;
  }

  .portal-header {
    text-align: center;
    margin-bottom: clamp(1.25rem, 5vw, 2.5rem);
  }

  .portal-title {
    font-size: clamp(2rem, 8vw, 3.25rem);
    font-weight: 700;
    color: #fff;
    text-shadow:
      0 3px 0 #5e35b1,
      0 6px 0 rgba(0, 0, 0, 0.12);
    letter-spacing: 0.02em;
    line-height: 1.15;
  }

  .portal-sub {
    margin-top: 0.5rem;
    font-size: clamp(1rem, 3.5vw, 1.25rem);
    font-weight: 500;
    color: rgba(255, 255, 255, 0.92);
  }

  .game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(280px, 100%), 1fr));
    gap: clamp(1rem, 4vw, 1.5rem);
    width: 100%;
    max-width: 720px;
  }

  .game-tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    padding: clamp(1.25rem, 4vw, 1.75rem);
    border-radius: 28px;
    text-decoration: none;
    color: inherit;
    background: linear-gradient(145deg, #fff9c4 0%, #ffecb3 40%, #ffab91 100%);
    border: 5px solid #fff;
    box-shadow:
      0 8px 0 #e65100,
      0 14px 28px rgba(0, 0, 0, 0.2);
    transform: translateY(0);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
  }

  .game-tile:hover {
    transform: translateY(-4px) scale(1.02);
    box-shadow:
      0 12px 0 #e65100,
      0 18px 32px rgba(0, 0, 0, 0.22);
  }

  .game-tile:active {
    transform: translateY(4px) scale(0.98);
    box-shadow:
      0 4px 0 #e65100,
      0 8px 16px rgba(0, 0, 0, 0.18);
  }

  .game-tile__art {
    font-size: clamp(4rem, 18vw, 5.5rem);
    line-height: 1;
    filter: drop-shadow(0 4px 0 rgba(230, 81, 0, 0.35));
    animation: tile-wiggle 2.5s ease-in-out infinite;
  }

  @keyframes tile-wiggle {
    0%, 100% { transform: rotate(-3deg) scale(1); }
    50% { transform: rotate(3deg) scale(1.05); }
  }

  @media (prefers-reduced-motion: reduce) {
    .game-tile__art { animation: none; }
    .game-tile { transition: none; }
    .game-tile:hover { transform: none; }
  }

  .game-tile__label {
    font-size: clamp(1.25rem, 4.5vw, 1.6rem);
    font-weight: 700;
    color: #bf360c;
    text-align: center;
    text-shadow: 0 1px 0 rgba(255, 255, 255, 0.8);
  }

  .game-tile__hint {
    font-size: 0.95rem;
    font-weight: 500;
    color: #e65100;
    opacity: 0.9;
  }

  /* --- Alphabet game shell --- */
  #app-alphabets {
    display: none;
    width: 100%;
    height: 100vh;
    height: 100dvh;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    background: #fff;
  }

  body.game-alphabets-open #app-alphabets {
    display: flex;
  }

  body.game-alphabets-open {
    overflow: hidden;
    align-items: center;
    justify-content: center;
    background: #fff;
  }

  body.game-alphabets-open #screen-home {
    display: none;
  }

  .home-btn {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 150;
    font-family: "Fredoka", system-ui, sans-serif;
    font-size: 15px;
    font-weight: 600;
    padding: 10px 16px;
    border-radius: 999px;
    border: 3px solid #7c4dff;
    background: #fff;
    color: #5e35b1;
    cursor: pointer;
    box-shadow: 0 3px 0 #5e35b1;
    -webkit-tap-highlight-color: transparent;
  }

  .home-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 #5e35b1;
  }

  #hint {
    font-size: 4vw;
    color: #aaa;
    transition: opacity 0.5s;
  }

  #letter {
    font-size: 50vw;
    font-weight: bold;
    line-height: 1;
    display: none;
  }

  #letter.pop {
    animation: pop 0.2s ease-out;
  }

  #letter.fade-out {
    animation: fade-out 0.5s ease-out forwards;
  }

  @keyframes pop {
    from { transform: scale(0.5); }
    to   { transform: scale(1.0); }
  }

  @keyframes fade-out {
    from { opacity: 1; }
    to   { opacity: 0; }
  }

  /* Mode buttons */
  #mode-buttons {
    position: fixed;
    top: 12px;
    right: 12px;
    z-index: 100;
    display: flex;
    gap: 6px;
  }
  .mode-btn {
    background: #eee;
    border: 1px solid #ccc;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 14px;
    font-family: system-ui, -apple-system, sans-serif;
    color: #666;
    cursor: pointer;
  }
  .mode-btn:hover { background: #ddd; }
  .mode-btn.active {
    background: #1e88e5;
    border-color: #1565c0;
    color: #fff;
  }
  .mode-btn.active { pointer-events: none; }

  /* Thumbs down overlay */
  #thumbs-down {
    position: fixed;
    bottom: 10vh;
    left: 50%;
    transform: translateX(-50%);
    font-size: 15vw;
    display: none;
    z-index: 50;
    animation: shake 0.4s ease-out;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(-50%) rotate(0deg); }
    20% { transform: translateX(-50%) rotate(-10deg); }
    40% { transform: translateX(-50%) rotate(10deg); }
    60% { transform: translateX(-50%) rotate(-5deg); }
    80% { transform: translateX(-50%) rotate(5deg); }
  }

  /* Celebration emojis */
  .celebration-emoji {
    position: fixed;
    z-index: 55;
    font-size: 12vw;
    pointer-events: none;
    animation: emoji-pop 1.5s ease-out forwards;
  }

  @keyframes emoji-pop {
    0%   { transform: scale(0) rotate(-20deg); opacity: 1; }
    30%  { transform: scale(1.2) rotate(5deg); opacity: 1; }
    50%  { transform: scale(1) rotate(0deg); opacity: 1; }
    100% { transform: scale(1.3) rotate(10deg); opacity: 0; }
  }

  /* Confetti particle */
  .confetti {
    position: fixed;
    pointer-events: none;
    z-index: 60;
    animation: confetti-burst var(--duration) ease-out forwards;
  }

  @keyframes confetti-burst {
    0% {
      transform: translate(0, 0) rotate(0deg);
      opacity: 1;
    }
    100% {
      transform: translate(var(--tx), var(--ty)) rotate(var(--rot));
      opacity: 0;
    }
  }

  #display-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #touch-grid {
    display: none;
  }

  @media (pointer: coarse) {
    body {
      flex-direction: column;
    }

    #display-area {
      flex: 0 0 55%;
    }

    #letter {
      font-size: 35vw;
    }

    #touch-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 4px;
      padding: 8px;
      width: 100%;
    }

    .grid-btn {
      border: none;
      border-radius: 8px;
      background: #f0f0f0;
      font-size: 5vw;
      font-weight: bold;
      font-family: system-ui, -apple-system, sans-serif;
      color: #333;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .grid-btn:active {
      background: #ddd;
      transform: scale(0.95);
    }

    #thumbs-down {
      bottom: auto;
      top: 35%;
      font-size: 10vw;
    }

    .celebration-emoji {
      font-size: 8vw;
    }
  }

  /* Chase mode */
  #chase-arena {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 10;
  }

  .chase-char {
    position: absolute;
    font-weight: bold;
    line-height: 1;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .chase-char:active {
    transform: scale(0.9);
  }
</style>
</head>
<body class="portal-open">

<div id="screen-home" aria-label="Game portal">
  <header class="portal-header">
    <h1 class="portal-title">Aria's Portal</h1>
    <p class="portal-sub">Pick a game to play!</p>
  </header>
  <div class="game-grid">
    <a class="game-tile" href="#alphabets" id="tile-alphabets">
      <span class="game-tile__art" aria-hidden="true">🔤🌈✨</span>
      <span class="game-tile__label">Learn Alphabets</span>
      <span class="game-tile__hint">Letters &amp; numbers!</span>
    </a>
  </div>
</div>

<div id="app-alphabets">
<button type="button" class="home-btn" id="btn-home" aria-label="Back to games">← Home</button>
<div id="mode-buttons">
  <button class="mode-btn active" data-mode="freeplay">Free Play</button>
  <button class="mode-btn" data-mode="quiz">Quiz</button>
  <button class="mode-btn" data-mode="chase">Chase</button>
</div>
<div id="display-area">
  <div id="hint">Press any letter or number!</div>
  <div id="letter"></div>
</div>
<div id="touch-grid"></div>
<div id="chase-arena"></div>
<div id="thumbs-down">👎</div>
<div id="confetti-container"></div>
</div>

<script>
const COLORS = [
  '#e53935', '#ff6d00', '#ffab00', '#43a047',
  '#1e88e5', '#8e24aa', '#d81b60', '#00897b',
  '#3949ab', '#f4511e'
];

const NUMBER_WORDS = {
  '0': 'zero', '1': 'one', '2': 'two', '3': 'three', '4': 'four',
  '5': 'five', '6': 'six', '7': 'seven', '8': 'eight', '9': 'nine'
};

const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';

const hint = document.getElementById('hint');
const letter = document.getElementById('letter');
const modeBtns = document.querySelectorAll('.mode-btn');
const thumbsDown = document.getElementById('thumbs-down');
const touchGrid = document.getElementById('touch-grid');
const isTouch = window.matchMedia('(pointer: coarse)').matches;

let lastColor = '';
let mode = 'freeplay';
let currentTarget = '';
let quizLocked = false; // prevents input during correct-answer celebration
let fadeTimer = null;
let delayedQuizTimer = null;
let delayedChaseTimer = null;
let thumbsDownTimer = null;

// --- Chase state ---
const chaseArena = document.getElementById('chase-arena');
let chaseDifficulty = 0;
let chaseChars = [];
let chaseAnimId = null;
let chaseTarget = '';
let chasePaused = false;
let chaseRepeatId = null;
let lastFrameTime = 0;

// --- Audio ---
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playChime() {
  const ctx = getAudioCtx();
  const notes = [523.25, 659.25, 783.99]; // C5, E5, G5
  notes.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.value = 0.15;
    gain.gain.setTargetAtTime(0, ctx.currentTime + i * 0.1 + 0.08, 0.02);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime + i * 0.1);
    osc.stop(ctx.currentTime + i * 0.1 + 0.2);
  });
}

function playBuzzer() {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.value = 200;
  gain.gain.value = 0.08;
  gain.gain.setTargetAtTime(0, ctx.currentTime + 0.25, 0.03);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime + 0.35);
}

// --- Confetti ---
const confettiContainer = document.getElementById('confetti-container');

function spawnConfetti() {
  const count = 60;
  const shapes = ['square', 'circle'];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti';

    // Random size
    const size = 8 + Math.random() * 14;
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    if (shapes[Math.floor(Math.random() * 2)] === 'circle') {
      el.style.borderRadius = '50%';
    }

    el.style.background = COLORS[Math.floor(Math.random() * COLORS.length)];

    // Start from center of screen
    el.style.left = '50vw';
    el.style.top = '50vh';

    // Random direction and distance via CSS custom properties
    const angle = Math.random() * 2 * Math.PI;
    const dist = 40 + Math.random() * 55;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;
    const rot = Math.random() * 720 - 360;
    const duration = 1.0 + Math.random() * 0.8;

    el.style.setProperty('--tx', tx + 'vw');
    el.style.setProperty('--ty', ty + 'vh');
    el.style.setProperty('--rot', rot + 'deg');
    el.style.setProperty('--duration', duration + 's');

    document.body.appendChild(el);

    // Cleanup after animation
    setTimeout(() => el.remove(), duration * 1000 + 50);
  }
}

// --- Celebration emojis ---
function showCelebrationEmojis() {
  const emojis = ['👍', '🎉'];
  const positions = [
    { left: '15vw', top: '25vh' },
    { right: '15vw', top: '25vh' },
  ];
  emojis.forEach((emoji, i) => {
    const el = document.createElement('div');
    el.className = 'celebration-emoji';
    el.textContent = emoji;
    Object.assign(el.style, positions[i]);
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1600);
  });
}

// --- Display helpers ---
function pickColor() {
  let color;
  do {
    color = COLORS[Math.floor(Math.random() * COLORS.length)];
  } while (color === lastColor);
  lastColor = color;
  return color;
}

function showChar(ch, color) {
  clearTimeout(fadeTimer);
  hint.style.display = 'none';
  letter.style.display = 'block';
  letter.style.opacity = '1';
  letter.textContent = ch;
  letter.style.color = color;
  letter.classList.remove('pop', 'fade-out');
  void letter.offsetWidth;
  letter.classList.add('pop');
}

function scheduleFade() {
  clearTimeout(fadeTimer);
  fadeTimer = setTimeout(() => {
    letter.classList.add('fade-out');
  }, 1500);
}

function speakChar(ch) {
  speechSynthesis.cancel();
  const text = NUMBER_WORDS[ch] || ch.toLowerCase();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.9;
  speechSynthesis.speak(u);
}

// --- Quiz logic ---
function pickQuizTarget() {
  let ch;
  do {
    ch = CHARS[Math.floor(Math.random() * CHARS.length)];
  } while (ch === currentTarget);
  currentTarget = ch;
}

function startQuizRound() {
  quizLocked = false;
  thumbsDown.style.display = 'none';
  pickQuizTarget();
  showChar(currentTarget, pickColor());
  speakChar(currentTarget);
}

function showThumbsDown() {
  thumbsDown.style.display = 'block';
  // Re-trigger shake animation
  thumbsDown.style.animation = 'none';
  void thumbsDown.offsetWidth;
  thumbsDown.style.animation = 'shake 0.4s ease-out';
  clearTimeout(thumbsDownTimer);
  thumbsDownTimer = setTimeout(() => {
    thumbsDownTimer = null;
    thumbsDown.style.display = 'none';
  }, 800);
}

// --- Chase mode ---
function getChaseParams() {
  const count = Math.min(3 + Math.floor(chaseDifficulty / 2), 8);
  const speed = 100 + chaseDifficulty * 10;
  const fontSize = Math.max(10, 18 - count);
  return { count, speed, fontSize };
}

function startChaseRound() {
  if (chaseAnimId) { cancelAnimationFrame(chaseAnimId); chaseAnimId = null; }
  chasePaused = false;
  thumbsDown.style.display = 'none';
  chaseChars.forEach(c => c.el.remove());
  chaseChars = [];

  const { count, speed, fontSize } = getChaseParams();
  const shuffled = CHARS.split('').sort(() => Math.random() - 0.5).slice(0, count);
  const colors = [...COLORS].sort(() => Math.random() - 0.5);
  chaseTarget = shuffled[Math.floor(Math.random() * shuffled.length)];

  shuffled.forEach((ch, i) => {
    const el = document.createElement('div');
    el.className = 'chase-char';
    el.textContent = ch;
    el.style.fontSize = fontSize + 'vmin';
    el.style.color = colors[i % colors.length];
    chaseArena.appendChild(el);
    chaseChars.push({ el, ch, x: 0, y: 0, vx: 0, vy: 0, w: 0, h: 0 });
  });

  // Measure after DOM insertion, then position and start animation
  requestAnimationFrame(() => {
    if (mode !== 'chase') return;
    chaseChars.forEach(c => {
      c.w = c.el.offsetWidth;
      c.h = c.el.offsetHeight;
      c.x = Math.random() * (window.innerWidth - c.w);
      c.y = Math.random() * (window.innerHeight - c.h);
      const angle = Math.random() * 2 * Math.PI;
      c.vx = Math.cos(angle) * speed;
      c.vy = Math.sin(angle) * speed;
      c.el.style.left = c.x + 'px';
      c.el.style.top = c.y + 'px';
    });
    lastFrameTime = 0;
    chaseAnimId = requestAnimationFrame(animateChase);
  });

  speakChar(chaseTarget);
  clearInterval(chaseRepeatId);
  chaseRepeatId = setInterval(() => {
    if (!chasePaused) {
      const text = NUMBER_WORDS[chaseTarget] || chaseTarget.toLowerCase();
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.9;
      speechSynthesis.speak(u);
    }
  }, 5000);
}

function animateChase(timestamp) {
  if (mode !== 'chase' || chaseChars.length === 0) {
    chaseAnimId = null;
    return;
  }

  if (!lastFrameTime) lastFrameTime = timestamp;
  const dt = Math.min((timestamp - lastFrameTime) / 1000, 0.05);
  lastFrameTime = timestamp;

  if (!chasePaused) {
    const W = window.innerWidth;
    const H = window.innerHeight;
    chaseChars.forEach(c => {
      c.x += c.vx * dt;
      c.y += c.vy * dt;
      if (c.x < 0) { c.x = 0; c.vx = Math.abs(c.vx); }
      if (c.y < 0) { c.y = 0; c.vy = Math.abs(c.vy); }
      if (c.x + c.w > W) { c.x = W - c.w; c.vx = -Math.abs(c.vx); }
      if (c.y + c.h > H) { c.y = H - c.h; c.vy = -Math.abs(c.vy); }
      c.el.style.left = c.x + 'px';
      c.el.style.top = c.y + 'px';
    });

    // Character-to-character collisions
    for (let i = 0; i < chaseChars.length; i++) {
      for (let j = i + 1; j < chaseChars.length; j++) {
        const a = chaseChars[i], b = chaseChars[j];
        const overlapX = Math.min(a.x + a.w, b.x + b.w) - Math.max(a.x, b.x);
        const overlapY = Math.min(a.y + a.h, b.y + b.h) - Math.max(a.y, b.y);
        if (overlapX > 0 && overlapY > 0) {
          if (overlapX < overlapY) {
            const half = overlapX / 2;
            if (a.x < b.x) { a.x -= half; b.x += half; }
            else { a.x += half; b.x -= half; }
            const tmp = a.vx; a.vx = b.vx; b.vx = tmp;
          } else {
            const half = overlapY / 2;
            if (a.y < b.y) { a.y -= half; b.y += half; }
            else { a.y += half; b.y -= half; }
            const tmp = a.vy; a.vy = b.vy; b.vy = tmp;
          }
          a.el.style.left = a.x + 'px'; a.el.style.top = a.y + 'px';
          b.el.style.left = b.x + 'px'; b.el.style.top = b.y + 'px';
        }
      }
    }
  }

  if (mode === 'chase' && chaseChars.length > 0) {
    chaseAnimId = requestAnimationFrame(animateChase);
  } else {
    chaseAnimId = null;
  }
}

function onChaseClick(e) {
  if (chasePaused) return;

  const x = e.clientX;
  const y = e.clientY;
  const margin = 30;

  const hits = chaseChars.filter(c =>
    x >= c.x - margin && x <= c.x + c.w + margin &&
    y >= c.y - margin && y <= c.y + c.h + margin
  );

  if (hits.length === 0) return;

  if (hits.some(c => c.ch === chaseTarget)) {
    chasePaused = true;
    chaseDifficulty = Math.min(chaseDifficulty + 1, 15);
    spawnConfetti();
    showCelebrationEmojis();
    playChime();
    clearTimeout(delayedChaseTimer);
    delayedChaseTimer = setTimeout(() => {
      delayedChaseTimer = null;
      startChaseRound();
    }, 2000);
  } else {
    chaseDifficulty = Math.max(chaseDifficulty - 1, 0);
    showThumbsDown();
    playBuzzer();
  }
}

chaseArena.addEventListener('click', onChaseClick);

function stopChase() {
  if (chaseAnimId) { cancelAnimationFrame(chaseAnimId); chaseAnimId = null; }
  clearInterval(chaseRepeatId);
  chaseRepeatId = null;
  chaseChars.forEach(c => c.el.remove());
  chaseChars = [];
}

function stopAlphabetsGame() {
  speechSynthesis.cancel();
  clearTimeout(fadeTimer);
  fadeTimer = null;
  clearTimeout(delayedQuizTimer);
  delayedQuizTimer = null;
  clearTimeout(delayedChaseTimer);
  delayedChaseTimer = null;
  clearTimeout(thumbsDownTimer);
  thumbsDownTimer = null;
  stopChase();
  setMode('freeplay');
}

// --- Mode toggle ---
function setMode(newMode) {
  if (mode === 'chase') stopChase();

  mode = newMode;
  modeBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.mode === mode));
  thumbsDown.style.display = 'none';
  quizLocked = false;

  const inChase = mode === 'chase';
  document.getElementById('display-area').style.display = inChase ? 'none' : '';
  touchGrid.style.display = inChase ? 'none' : '';
  chaseArena.style.display = inChase ? 'block' : 'none';

  if (mode === 'quiz') {
    startQuizRound();
  } else if (mode === 'chase') {
    chaseDifficulty = 0;
    startChaseRound();
  } else {
    letter.style.display = 'none';
    hint.style.display = 'block';
    hint.textContent = isTouch ? 'Tap any letter or number!' : 'Press any letter or number!';
    currentTarget = '';
  }
}

modeBtns.forEach(btn => {
  btn.addEventListener('click', function() {
    setMode(btn.dataset.mode);
    btn.blur();
  });
});

// --- Input handling ---
function handleChar(key) {
  if (mode === 'chase') return;
  if (mode === 'freeplay') {
    showChar(key, pickColor());
    speakChar(key);
    scheduleFade();
  } else {
    if (quizLocked) return;
    if (key === currentTarget) {
      quizLocked = true;
      spawnConfetti();
      showCelebrationEmojis();
      playChime();
      clearTimeout(delayedQuizTimer);
      delayedQuizTimer = setTimeout(() => {
        delayedQuizTimer = null;
        startQuizRound();
      }, 2000);
    } else {
      showThumbsDown();
      playBuzzer();
    }
  }
}

// --- Touch grid ---
CHARS.split('').forEach(ch => {
  const btn = document.createElement('button');
  btn.className = 'grid-btn';
  btn.textContent = ch;
  btn.addEventListener('click', () => handleChar(ch));
  touchGrid.appendChild(btn);
});

if (isTouch) {
  hint.textContent = 'Tap any letter or number!';
}

// --- Keydown handler ---
document.addEventListener('keydown', function(e) {
  if (!document.body.classList.contains('game-alphabets-open')) return;
  if (e.metaKey || e.ctrlKey || e.altKey || e.repeat) return;
  const key = e.key.toUpperCase();
  if (!/^[A-Z0-9]$/.test(key)) return;
  e.preventDefault();
  handleChar(key);
});

// --- Portal routing (landing ↔ games) ---
let wasInAlphabets = false;

function applyRouteFromHash() {
  const id = (location.hash || '').replace(/^#/, '');
  const inAlphabets = id === 'alphabets';
  if (wasInAlphabets && !inAlphabets) stopAlphabetsGame();
  wasInAlphabets = inAlphabets;
  document.body.classList.toggle('portal-open', !inAlphabets);
  document.body.classList.toggle('game-alphabets-open', inAlphabets);
}

window.addEventListener('hashchange', applyRouteFromHash);
applyRouteFromHash();

document.getElementById('btn-home').addEventListener('click', function() {
  location.hash = '';
  this.blur();
});
</script>
